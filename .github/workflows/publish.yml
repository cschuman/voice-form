name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm test

      - name: Generate SRI hashes
        run: |
          echo "## SRI Hashes" >> "$GITHUB_STEP_SUMMARY"
          for f in packages/core/dist/voiceform.global.js; do
            if [ -f "$f" ]; then
              HASH=$(shasum -b -a 384 "$f" | awk '{ print $1 }' | xxd -r -p | base64)
              echo "- \`$(basename "$f")\`: \`sha384-${HASH}\`" >> "$GITHUB_STEP_SUMMARY"
              echo "SRI_HASH=sha384-${HASH}" >> "$GITHUB_ENV"
            fi
          done

      # Note on security: inputs.dry_run is a constrained choice type (true/false only),
      # not free-form user input. No injection risk.
      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: pnpm changeset publish --no-git-tag --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        run: pnpm changeset publish --no-git-tag --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
